<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sfh:#222633;--bd:#2a2e3d;--tx:#e4e6ed;--tm:#8b90a0;--ac:#6c8cff;--acd:rgba(108,140,255,.12);--gn:#4ecb71;--gnd:rgba(78,203,113,.12);--pp:#c4a8ff;--ppd:rgba(179,136,255,.10);--dim:#555a6e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:24px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{width:38px;height:38px;background:linear-gradient(135deg,#6c8cff,#b388ff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
h1{font-size:20px;font-weight:700;display:inline}
h1 span{color:var(--tm);font-weight:400;font-size:14px;margin-left:10px}
.ref{color:var(--dim);font-size:11px;margin-left:10px}
.flt{display:flex;gap:8px;flex-wrap:wrap}
.fb{background:var(--sf);border:1px solid var(--bd);color:var(--tm);padding:6px 14px;border-radius:8px;font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .15s}
.fb:hover{background:var(--sfh);color:var(--tx)}
.fb.on{background:var(--acd);border-color:var(--ac);color:var(--ac)}
.stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.st{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:10px;min-width:130px}
.sn{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.sl{font-size:11.5px;color:var(--tm);line-height:1.3}
.tw{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1100px}
thead th{text-align:left;padding:12px 11px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tm);border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:0;background:var(--sf);z-index:1}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--sfh)}
td{padding:10px 11px;font-size:13.5px;border-bottom:1px solid rgba(42,46,61,.5);vertical-align:top;line-height:1.45}
.dy{font-weight:600;white-space:nowrap}
.dt{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--tm);white-space:nowrap}
.tm{font-family:'JetBrains Mono',monospace;font-size:12.5px;white-space:nowrap}
.tp{font-weight:500}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap}
.b-ext{background:var(--gnd);color:var(--gn)}
.b-int{background:var(--acd);color:var(--ac)}
.chip{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap;line-height:1.6;margin:2px}
.c-req{background:rgba(108,140,255,.10);color:#8ba4ff}
.c-opt{background:rgba(179,136,255,.10);color:#c4a8ff}
.nt{font-size:12.5px;max-width:220px;white-space:pre-line}
.lk{display:inline-flex;align-items:center;gap:4px;background:var(--acd);color:var(--ac);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;text-decoration:none;white-space:nowrap;transition:background .15s}
.lk:hover{background:rgba(108,140,255,.22)}
.wd td{background:rgba(108,140,255,.05);padding:8px 11px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ac);border-bottom:1px solid var(--bd)}
.today{background:rgba(108,140,255,.04)!important}
.tg{margin-left:8px;font-size:9px;background:var(--ac);color:#fff;padding:2px 6px;border-radius:4px;font-weight:700;vertical-align:middle}
@media(max-width:768px){body{padding:12px}.st{min-width:100px;padding:10px 12px}.sn{font-size:18px}}
</style>
</head>

<div class="tw"><table><thead><tr>

const tb=document.getElementById("tb");
let filt="all";
const icon='<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 10l4-4"/><path d="M4 8V4h4"/><path d="M8 12h4V8"/></svg>';

function wk(ds){const d=new Date(ds),s=new Date(d);s.setDate(d.getDate()-d.getDay());const e=new Date(s);e.setDate(s.getDate()+6);const f=x=>x.toLocaleDateString("en-US",{month:"short",day:"numeric"});return"Week of "+f(s)+" – "+f(e)}

function chips(arr,cls){if(!arr||!arr.length)return'<span style="color:var(--dim);font-size:12px">—</span>';return arr.map(a=>'<span class="chip '+cls+'">'+a+'</span>').join("")}

function render(){
  const fl=filt==="all"?M:M.filter(m=>m.ty===filt);
  document.getElementById("s-tot").textContent=fl.length;
  document.getElementById("s-ext").textContent=fl.filter(m=>m.ty==="external").length;
  document.getElementById("s-int").textContent=fl.filter(m=>m.ty==="internal").length;
  let h="",lw="";
  fl.forEach(m=>{
    const w=wk(m.dt);
    if(w!==lw){h+='<tr class="wd"><td colspan="9">'+w+"</td></tr>";lw=w}
    const bc=m.ty==="external"?"b-ext":"b-int";
    const bl=m.ty==="external"?"External":"Internal";
    const lnk=m.lk?'<a class="lk" href="'+m.lk+'" target="_blank" rel="noopener">'+icon+" Join</a>":'<span style="color:var(--dim);font-size:12px">—</span>';
    h+='<tr'+(m.today?' class="today"':"")+">"
      +'<td class="dy">'+m.d+(m.today?'<span class="tg">TODAY</span>':"")+"</td>"
      +'<td class="dt">'+m.dt+"</td>"
      +'<td class="tm">'+m.t+"</td>"
      +'<td class="tp">'+m.tp+"</td>"
      +'<td><span class="badge '+bc+'">'+bl+"</span></td>"
      +"<td>"+chips(m.rq,"c-req")+"</td>"
      +"<td>"+chips(m.op,"c-opt")+"</td>"
      +'<td class="nt" style="color:'+(m.n?"var(--tx)":"var(--dim)")+'">'+(m.n||"—")+"</td>"
      +"<td>"+lnk+"</td></tr>";
  });
  tb.innerHTML=h;
}

document.querySelectorAll(".fb").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".fb").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");filt=b.dataset.f;render();
  });
});
render();
